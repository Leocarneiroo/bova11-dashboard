function mkRank(title,st,sortFn,cols){
  const rows=[...st].sort(sortFn).slice(0,10);
  let h=`<div class="card"><h3>${title}</h3><div style="max-height:300px;overflow:auto"><table><thead><tr>`;
  cols.forEach(c=>{h+=`<th>${c.h}</th>`});
  h+=`</tr></thead><tbody>`;
  rows.forEach(r=>{h+=`<tr>`;cols.forEach(c=>{const v=c.fmt?c.fmt(r):(r[c.k]??'–');h+=`<td class="${c.cls?c.cls(r):''}">${v}</td>`});h+=`</tr>`});
  return h+`</tbody></table></div></div>`}

  let h='<div class="stitle">Variações das Gregas (D-1 → D)</div><div class="g2">';

  h+=mkG('Δ Gamma Call / Put',[  {h:'ΔC',k:'dc_gamma',d:1,p:6},{h:'C₁',k:'c_gamma1',p:6},{h:'C',k:'c_gamma2',p:6},{h:'ΔP',k:'dp_gamma',d:1,p:6},{h:'P₁',k:'p_gamma1',p:6},{h:'P',k:'p_gamma2',p:6}]);
  h+=mkG('Δ Theta Call / Put',[  {h:'ΔC',k:'dc_theta',d:1,p:4},{h:'C₁',k:'c_theta1',p:4},{h:'C',k:'c_theta2',p:4},{h:'ΔP',k:'dp_theta',d:1,p:4},{h:'P₁',k:'p_theta1',p:4},{h:'P',k:'p_theta2',p:4}]);
  h+=mkG('Δ Vega Call / Put',[   {h:'ΔC',k:'dc_vega',d:1,p:4},{h:'C₁',k:'c_vega1',p:4},{h:'C',k:'c_vega2',p:4},{h:'ΔP',k:'dp_vega',d:1,p:4},{h:'P₁',k:'p_vega1',p:4},{h:'P',k:'p_vega2',p:4}]);
  h+='</div>';
  document.getElementById('vGreeks').innerHTML=h;
}

function renderAgg(){
  if(cur!=='AGG')return;
  const rows=[...AGG].sort((a,b)=>a.s-b.s);
  let h='<div class="stitle">Rankings Agregados (todos os vencimentos)</div><div class="g4">';
  h+=mkRank('🔥 Vol Total D (Agg)',rows,(a,b)=>b.tv-a.tv,[{h:'K',k:'s'},{h:'VolC',fmt:r=>fI(r.cv)},{h:'VolP',fmt:r=>fI(r.pv)},{h:'Total',fmt:r=>'<b>'+fI(r.tv)+'</b>'}]);
  h+=mkRank('📈 ΔVol Total (Agg)',rows,(a,b)=>b.dtv-a.dtv,[{h:'K',k:'s'},{h:'ΔVC',fmt:r=>sg(r.dcv)+fI(r.dcv),cls:r=>pc(r.dcv)},{h:'ΔVP',fmt:r=>sg(r.dpv)+fI(r.dpv),cls:r=>pc(r.dpv)},{h:'ΔT',fmt:r=>'<b>'+sg(r.dtv)+fI(r.dtv)+'</b>',cls:r=>pc(r.dtv)}]);
  h+=mkRank('📊 ΔOI Call (abs, Agg)',rows,(a,b)=>Math.abs(b.dco)-Math.abs(a.dco),[{h:'K',k:'s'},{h:'OI D-1',fmt:r=>fI(r.co1)},{h:'OI D',fmt:r=>fI(r.co2)},{h:'Δ',fmt:r=>'<b>'+sg(r.dco)+fI(r.dco)+'</b>',cls:r=>pc(r.dco)}]);
  h+=mkRank('📊 ΔOI Put (abs, Agg)',rows,(a,b)=>Math.abs(b.dpo)-Math.abs(a.dpo),[{h:'K',k:'s'},{h:'OI D-1',fmt:r=>fI(r.po1)},{h:'OI D',fmt:r=>fI(r.po2)},{h:'Δ',fmt:r=>'<b>'+sg(r.dpo)+fI(r.dpo)+'</b>',cls:r=>pc(r.dpo)}]);
  h+='</div>';
  h+='<div class="stitle">Tabela Agregada por Strike</div><div class="card"><div style="max-height:500px;overflow:auto"><table><thead><tr>'+
    '<th>K</th><th>OI C₁</th><th>OI C</th><th>ΔOI C</th><th>OI P₁</th><th>OI P</th><th>ΔOI P</th>'+
    '<th>VC₁</th><th>VC</th><th>ΔVC</th><th>VP₁</th><th>VP</th><th>ΔVP</th><th>ΔVT</th>'+
    '<th>IVC₁</th><th>IVC</th><th>ΔIVC</th><th>IVP₁</th><th>IVP</th><th>ΔIVP</th></tr></thead><tbody>';
  rows.forEach(r=>{
    const a=Math.abs(r.s-SPOT)<1.5;
    h+=`<tr${a?' class="atm"':''}>
      <td>${r.s}</td>
      <td>${fI(r.co1)}</td><td>${fI(r.co2)}</td><td class="${pc(r.dco)}">${sg(r.dco)}${fI(r.dco)}</td>
      <td>${fI(r.po1)}</td><td>${fI(r.po2)}</td><td class="${pc(r.dpo)}">${sg(r.dpo)}${fI(r.dpo)}</td>
      <td>${fI(r.cv1)}</td><td>${fI(r.cv)}</td><td class="${pc(r.dcv)}">${sg(r.dcv)}${fI(r.dcv)}</td>
      <td>${fI(r.pv1)}</td><td>${fI(r.pv)}</td><td class="${pc(r.dpv)}">${sg(r.dpv)}${fI(r.dpv)}</td>
      <td class="${pc(r.dtv)}"><b>${sg(r.dtv)}${fI(r.dtv)}</b></td>
      <td>${r.c_iv_avg1!=null?r.c_iv_avg1.toFixed(1)+'%':'–'}</td><td>${r.c_iv_avg!=null?r.c_iv_avg.toFixed(1)+'%':'–'}</td>
      <td class="${pc(r.div_c)}">${r.div_c!=null?sg(r.div_c)+r.div_c.toFixed(2)+'pp':'–'}</td>
      <td>${r.p_iv_avg1!=null?r.p_iv_avg1.toFixed(1)+'%':'–'}</td><td>${r.p_iv_avg!=null?r.p_iv_avg.toFixed(1)+'%':'–'}</td>
      <td class="${pc(r.div_p)}">${r.div_p!=null?sg(r.div_p)+r.div_p.toFixed(2)+'pp':'–'}</td></tr>`});
  h+='</tbody></table></div></div>';
  document.getElementById('vAgg').innerHTML=h;
}

function renderAll(){renderTabs();renderViewSel();showViews();renderKPIs();renderRankings();renderTable();renderGreeks();renderAgg();}
renderAll();
</script></body></html>
