function renderTabs(){

  el.innerHTML=KEYS.map((k,i)=>`<div class="tab ${k===cur?'on':''}" style="${k===cur?'background:'+cc(D[k].color):''}" data-k="${k}">${NAMES[i]}</div>`).join('')+
    `<div class="tab agg ${cur==='AGG'?'on':''}" data-k="AGG">🔗 AGREGADO</div>`;
  el.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{cur=t.dataset.k;if(cur==='AGG')view='agg';else if(view==='agg')view='rank';renderAll()});
}
function renderViewSel(){
  const el=document.getElementById('viewSel');
  if(cur==='AGG'){el.innerHTML='';return}
  const vs=[{id:'rank',l:'📊 Rankings'},{id:'table',l:'📋 Tabela'},{id:'greeks',l:'🔬 Gregas'}];
  el.innerHTML=vs.map(v=>`<div class="vbtn ${view===v.id?'on':''}" data-v="${v.id}">${v.l}</div>`).join('');
  el.querySelectorAll('.vbtn').forEach(b=>b.onclick=()=>{view=b.dataset.v;renderAll()});
}
function showViews(){

  else document.getElementById({rank:'vRank',table:'vTable',greeks:'vGreeks'}[view]).style.display='block';
}

function mkRank(title,st,sortFn,cols){
  const rows=[...st].sort(sortFn).slice(0,10);
  let h=`<div class="card"><h3>${title}</h3><div style="max-height:300px;overflow:auto"><table><thead><tr>`;
  cols.forEach(c=>{h+=`<th>${c.h}</th>`});
  h+=`</tr></thead><tbody>`;
  rows.forEach(r=>{h+=`<tr>`;cols.forEach(c=>{const v=c.fmt?c.fmt(r):(r[c.k]??'–');h+=`<td class="${c.cls?c.cls(r):''}">${v}</td>`});h+=`</tr>`});
  return h+`</tbody></table></div></div>`}

function renderGreeks(){
  if(cur==='AGG')return;
  const st=D[cur].strikes;
  function mkG(title,fields){
    const rows=[...st].sort((a,b)=>a.s-b.s);
    let h=`<div class="card"><h3>${title}</h3><div style="max-height:380px;overflow:auto"><table><thead><tr><th>K</th>`;
    fields.forEach(f=>{h+=`<th>${f.h}</th>`});
    h+='</tr></thead><tbody>';
    rows.forEach(r=>{
      const a=Math.abs(r.s-SPOT)<1.5;
      h+=`<tr${a?' class="atm"':''}><td>${r.s}</td>`;
      fields.forEach(f=>{const v=r[f.k];h+=`<td class="${f.d?pc(v):''}">${v!=null?(f.d?sg(v):'')+fD(v,f.p||4):'–'}</td>`});
      h+='</tr>'});
    return h+'</tbody></table></div></div>'}
  let h='<div class="stitle">Variações das Gregas (D-1 → D)</div><div class="g2">';
  h+=mkG('Δ Delta Call / Put',[  {h:'ΔC',k:'dc_delta',d:1,p:4},{h:'C₁',k:'c_delta1',p:4},{h:'C',k:'c_delta2',p:4},{h:'ΔP',k:'dp_delta',d:1,p:4},{h:'P₁',k:'p_delta1',p:4},{h:'P',k:'p_delta2',p:4}]);
  h+=mkG('Δ Gamma Call / Put',[  {h:'ΔC',k:'dc_gamma',d:1,p:6},{h:'C₁',k:'c_gamma1',p:6},{h:'C',k:'c_gamma2',p:6},{h:'ΔP',k:'dp_gamma',d:1,p:6},{h:'P₁',k:'p_gamma1',p:6},{h:'P',k:'p_gamma2',p:6}]);
  h+=mkG('Δ Theta Call / Put',[  {h:'ΔC',k:'dc_theta',d:1,p:4},{h:'C₁',k:'c_theta1',p:4},{h:'C',k:'c_theta2',p:4},{h:'ΔP',k:'dp_theta',d:1,p:4},{h:'P₁',k:'p_theta1',p:4},{h:'P',k:'p_theta2',p:4}]);
  h+=mkG('Δ Vega Call / Put',[   {h:'ΔC',k:'dc_vega',d:1,p:4},{h:'C₁',k:'c_vega1',p:4},{h:'C',k:'c_vega2',p:4},{h:'ΔP',k:'dp_vega',d:1,p:4},{h:'P₁',k:'p_vega1',p:4},{h:'P',k:'p_vega2',p:4}]);
  h+='</div>';
  document.getElementById('vGreeks').innerHTML=h;
}
