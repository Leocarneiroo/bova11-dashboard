<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BOVA11 — GEX 10/Mar/2025</title>
<style>
:root{--bg:#080c15;--card:#0f1628;--brd:#1b2744;--text:#e0e7f5;--mut:#5a6b8a;--grn:#00e676;--red:#ff5252;--blu:#448aff;--yel:#ffca28;--pur:#b388ff;--org:#ff8a65;--cyn:#26c6da}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif}
.hdr{padding:16px 24px;border-bottom:1px solid var(--brd);background:linear-gradient(135deg,#0f1628,#1a2550)}
.h1{font-size:22px;font-weight:900} .sub{color:var(--mut);font-size:12px;margin-top:4px}
.wrap{max-width:1400px;margin:0 auto;padding:16px 20px}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.tab{padding:8px 14px;border:1px solid var(--brd);background:var(--card);border-radius:8px;color:var(--mut);cursor:pointer;font-weight:700;font-size:12px;transition:all .15s}
.tab:hover{border-color:var(--blu);color:var(--text)}
.tab.on{color:#fff;border-color:transparent;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.tab.agg{background:linear-gradient(135deg,#1a237e,#283593);color:#fff;border-color:#3949ab}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:14px}
.kpi{background:var(--card);border:1px solid var(--brd);border-radius:10px;padding:12px 14px}
.kpi .l{font-size:9px;color:var(--mut);font-weight:800;text-transform:uppercase;letter-spacing:.5px}
.kpi .v{font-size:20px;font-weight:900;margin-top:3px}
.kpi .d{font-size:11px;margin-top:2px;color:var(--mut)}
.card{background:var(--card);border:1px solid var(--brd);border-radius:10px;padding:14px;margin-bottom:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:900px){.g2{grid-template-columns:1fr}}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{padding:6px 8px;border-bottom:1px solid rgba(27,39,68,.45);text-align:right}
th{color:var(--mut);font-size:9.5px;text-transform:uppercase;letter-spacing:.3px;position:sticky;top:0;background:var(--card)}
th:first-child,td:first-child{text-align:left}
.pos{color:var(--grn)} .neg{color:var(--red)}
.small{font-size:10px;color:var(--mut)}
.bar{height:14px;border-radius:3px;display:inline-block;vertical-align:middle;min-width:2px}
.bar-wrap{display:flex;align-items:center;gap:0;height:14px}
.bar-c{background:var(--grn);opacity:.7;height:14px;border-radius:3px 0 0 3px}
.bar-p{background:var(--red);opacity:.7;height:14px;border-radius:0 3px 3px 0}
tr.spot-row{background:rgba(68,138,255,.08)}
.stitle{font-size:14px;font-weight:800;margin:18px 0 10px;padding-left:10px;border-left:3px solid var(--blu)}
</style></head><body>

</div>

const NAMES=["13 mar W2", "20 mar Mensal", "27 mar W4", "17 abr Mensal"];
const SPOT=parseFloat('179.60');
let gexCur='AGG';

const cc=c=>({red:'var(--red)',blu:'var(--blu)',grn:'var(--grn)',yel:'var(--yel)',pur:'var(--pur)',org:'var(--org)',cyn:'var(--cyn)'}[c]||'var(--blu)');
const pc=n=>n>=0?'pos':'neg';
const sg=n=>n>=0?'+':'';
const fI=n=>{if(n==null)return'–';const a=Math.abs(n);return a>=1e6?(n/1e6).toFixed(1)+'M':a>=1e3?(n/1e3).toFixed(0)+'k':String(Math.round(n))};
const fG=n=>n>=0?'+'+fI(n):'−'+fI(Math.abs(n));

function renderGexTabs(){
  const el=document.getElementById('gexTabs');
  let html=`<div class="tab agg ${gexCur==='AGG'?'on':''}" data-k="AGG">🔗 AGREGADO</div>`;
  KEYS.forEach((k,i)=>{
    const e=EXP.find(x=>x.key===k);
    html+=`<div class="tab ${gexCur===k?'on':''}" style="${gexCur===k?'background:'+cc(e.color):''}" data-k="${k}">${NAMES[i]}</div>`;
  });
  el.innerHTML=html;
  el.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{gexCur=t.dataset.k;renderGexAll()});
}

    el.innerHTML=`

function renderExpSummary(){
  document.getElementById('expSummary').innerHTML=EXP.map(e=>{
    const g=GEX_EXP[e.key];
    return`<tr>
      <td style="color:${cc(e.color)}">${e.name}</td>
      <td class="${pc(e.gex)}"><b>${fI(e.gex)}</b></td>
      <td>${g.flip!=null?g.flip:'–'}</td>
      <td>K${g.dom_s} (${fI(g.dom_n)})</td>
      <td>${e.iv_c_atm}%</td>
      <td class="${pc(e.div_c_atm)}">${sg(e.div_c_atm)}${e.div_c_atm.toFixed(2)}pp</td>
      <td>${e.mp}</td>
      <td>${e.pcr_oi}</td>
    </tr>`}).join('');
}

function renderStrikeTable(){
  const titleEl=document.getElementById('strikeTitle');
  const bodyEl=document.getElementById('strikeBody');
  let data;
  if(gexCur==='AGG'){
    titleEl.textContent='GEX por Strike — Agregado (todos os vencimentos)';
    data=AGG;
  } else {
    const e=EXP.find(x=>x.key===gexCur);
    titleEl.textContent='GEX por Strike — '+e.name;
    data=GEX_EXP[gexCur].strikes;
  }
  const maxAbs=Math.max(...data.map(r=>Math.abs(r.n)),1);
  const maxC=Math.max(...data.map(r=>Math.abs(r.c)),1);
  const maxP=Math.max(...data.map(r=>Math.abs(r.p)),1);
  const maxCP=Math.max(maxC,maxP,1);
  bodyEl.innerHTML=data.map(r=>{
    const wN=Math.round(Math.abs(r.n)/maxAbs*90);
    const colN=r.n>=0?'var(--grn)':'var(--red)';
    const wC=Math.round(Math.abs(r.c)/maxCP*45);
    const wP=Math.round(Math.abs(r.p)/maxCP*45);
    const isSpot=Math.abs(r.s-SPOT)<1.5;
    return`<tr${isSpot?' class="spot-row"':''}>
      <td>K${r.s}</td>
      <td class="${pc(r.c)}">${fI(r.c)}</td>
      <td class="${pc(r.p)}">${fI(r.p)}</td>
      <td class="${pc(r.n)}"><b>${fI(r.n)}</b></td>
      <td style="text-align:left">
        <span class="bar" style="width:${wN}px;background:${colN}"></span>
      </td>
    </tr>`}).join('');
}

function renderGexAll(){
  renderGexTabs();
  renderGexKpis();
  renderExpSummary();
  renderStrikeTable();
}
renderGexAll();
</script></body></html>
